spring.application.name=payment-gateway
server.port=8090

logging.pattern.level=%5p [req=%X{requestId:-} corr=%X{correlationId:-}]

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

gateway.acquiring-bank.url=http://localhost:8080/payments
gateway.acquiring-bank.connect-timeout=2s
gateway.acquiring-bank.read-timeout=5s

gateway.acquiring-bank.resilience.retry.max-attempts=3
gateway.acquiring-bank.resilience.retry.initial-backoff=200ms
gateway.acquiring-bank.resilience.retry.backoff-multiplier=2.0
gateway.acquiring-bank.resilience.circuit-breaker.failure-rate-threshold=50
gateway.acquiring-bank.resilience.circuit-breaker.sliding-window-size=20
gateway.acquiring-bank.resilience.circuit-breaker.minimum-number-of-calls=10
gateway.acquiring-bank.resilience.circuit-breaker.wait-duration-in-open-state=30s
gateway.acquiring-bank.resilience.circuit-breaker.permitted-calls-in-half-open-state=3

# TODO Phase 6: secure /actuator/** behind auth before enabling outside dev.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=ALWAYS
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s